repos:
-   repo: local
    hooks:
    -   id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]
    -   id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
    -   id: mypy
        name: mypy
        entry: uv run mypy limiter
        language: system
        types: [python]
        pass_filenames: false
