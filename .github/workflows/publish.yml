name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Validate Semantic Version tag
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              raise SystemExit(f"Tag {tag!r} is not a valid Semantic Version release tag.")

          pyproject = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          version = pyproject["project"]["version"]
          if version != tag[1:]:
              raise SystemExit(
                  f"Tag version {tag[1:]!r} does not match pyproject version {version!r}."
              )
          PY

      - name: Sync development dependencies
        run: uv sync --dev --frozen

      - name: Build distribution artifacts
        run: uv run --with build python -m build

      - name: Check distribution metadata
        run: uv run --with twine twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/falcon-rate-limiter/

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist/

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
