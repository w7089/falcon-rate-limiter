name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync development dependencies
        run: uv sync --dev --frozen

      - name: Run lint, type-checks, and unit tests
        run: make check

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync development dependencies
        run: uv sync --dev --frozen

      - name: Build distribution artifacts
        run: uv run --with build python -m build

      - name: Check distribution metadata
        run: uv run --with twine twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync development and e2e dependencies
        run: uv sync --dev --group e2e --frozen

      - name: Start e2e stack
        run: docker compose -f tests/e2e/docker-compose.yml up --build -d

      - name: Wait for e2e app health
        run: |
          for i in $(seq 1 30); do
            id=$(docker compose -f tests/e2e/docker-compose.yml ps -q app)
            status=$(docker inspect --format='{{.State.Health.Status}}' "$id" 2>/dev/null || true)
            if [ "$status" = "healthy" ]; then
              echo "App is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: App did not become healthy in time."
          exit 1

      - name: Run e2e tests
        run: uv run pytest tests/e2e/test_e2e.py

      - name: Stop e2e stack
        if: always()
        run: docker compose -f tests/e2e/docker-compose.yml down --volumes
